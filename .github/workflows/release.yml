name: Release

"on":
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  package:
    name: Package and publish (Node 22.23.1, npm 10.9.8)
    runs-on: macos-15
    timeout-minutes: 35

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: .node-version
          cache: npm

      - name: Pin npm
        run: npm install --global npm@10.9.8

      - name: Verify toolchain
        shell: bash
        run: |
          test "$(node --version)" = "v$(cat .node-version)"
          test "$(npm --version)" = "10.9.8"

      - name: Install locked dependencies
        run: npm ci

      - name: Full check and ad-hoc package
        run: npm run package:mac

      - name: Audit dependencies
        run: npm audit --audit-level=low

      - name: Write artifact checksums
        run: (cd release && shasum -a 256 *.dmg *.zip > SHA256SUMS)

      - name: Publish ad-hoc-signed release artifacts to the public releases repo
        env:
          # The default GITHUB_TOKEN is scoped to this (private) repo only.
          # Publishing into the separate public releases repo requires a
          # fine-grained PAT, scoped to that repo only (contents: write),
          # stored as the RELEASES_REPO_TOKEN secret.
          GH_TOKEN: ${{ secrets.RELEASES_REPO_TOKEN }}
        run: |
          set -euo pipefail
          gh release create "${{ github.ref_name }}" \
            --repo PhysicistJohn/Atom-Flasher-releases \
            --title "TinySA Flasher ${{ github.ref_name }}" \
            --notes "Draft release ${{ github.ref_name }}. Verify downloads against SHA256SUMS." \
            --draft \
            release/*.dmg \
            release/*.zip \
            release/SHA256SUMS
